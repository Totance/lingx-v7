<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINGX 零想科技 | 点亮你的梦境</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Noto+Sans+SC:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 色彩系统 */
      --color-bg: #050510;
      --color-primary: #4a9eff;
      --color-secondary: #ffd700;
      --color-accent: #00ffff;
      --color-text-primary: rgba(255, 255, 255, 0.9);
      --color-text-secondary: rgba(255, 255, 255, 0.6);
      --color-text-tertiary: rgba(255, 255, 255, 0.4);
      
      /* 字体系统 */
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Noto Sans SC', sans-serif;
      
      /* 间距系统 */
      --space-xs: 8px;
      --space-sm: 10px;
      --space-md: 20px;
      --space-lg: 40px;
      --space-xl: 60px;
      
      /* 动效 */
      --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: 0.3s var(--ease-out);
      --transition-slow: 1.2s var(--ease-out);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-body);
      color: var(--color-text-primary);
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
